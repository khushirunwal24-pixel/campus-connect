<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Campus Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary: #0f2d52;
      --primary-light: #1a4a8a;
      --accent: #00c2b3;
      --danger: #ef4444;
      --success: #10b981;
      --font: 'DM Sans', sans-serif;
      --display: 'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: linear-gradient(135deg, #0f2d52 0%, #1a4a8a 55%, #0d3555 100%);
      position: relative;
      overflow: hidden;
    }

    /* Background decorative circles */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      right: -10%;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,194,179,0.2) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      left: -10%;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,53,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ===== CARD ===== */
    .card {
      background: #ffffff;
      border-radius: 24px;
      width: 100%;
      max-width: 430px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.35);
      overflow: hidden;
      position: relative;
      z-index: 1;
      animation: cardIn 0.4s ease;
    }
    @keyframes cardIn {
      from { transform: translateY(24px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* ===== CARD HEADER ===== */
    .card-header {
      background: linear-gradient(135deg, var(--primary), #1a4a8a);
      padding: 2.2rem 2rem 1.8rem;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .card-header::after {
      content: '';
      position: absolute;
      top: -40%;
      right: -15%;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .logo {
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--display);
      font-size: 1.5rem;
      font-weight: 800;
      color: white;
      margin: 0 auto 1rem;
    }
    .card-title {
      font-family: var(--display);
      font-size: 1.55rem;
      font-weight: 800;
      margin-bottom: 0.3rem;
    }
    .card-sub {
      font-size: 0.85rem;
      opacity: 0.72;
    }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      background: #f1f5f9;
      margin: 1.5rem 1.5rem 0;
      border-radius: 12px;
      padding: 4px;
    }
    .tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      border-radius: 9px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      color: #64748b;
      border: none;
      background: none;
      transition: all 0.2s;
      font-family: var(--font);
    }
    .tab.active {
      background: white;
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* ===== BODY ===== */
    .card-body {
      padding: 1.5rem;
    }

    /* ===== DOMAIN NOTE ===== */
    .domain-note {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,194,179,0.08);
      border: 1px solid rgba(0,194,179,0.28);
      border-radius: 10px;
      padding: 10px 13px;
      font-size: 0.81rem;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    /* ===== ERROR BOX ===== */
    .error-box {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 10px 13px;
      font-size: 0.83rem;
      color: var(--danger);
      margin-bottom: 1.1rem;
    }
    .error-box.show { display: flex; }

    /* ===== FORM ===== */
    .form-section { display: none; }
    .form-section.active { display: block; }

    .form-group { margin-bottom: 1.1rem; }
    .form-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 11px;
      font-size: 0.93rem;
      font-family: var(--font);
      color: #0d1b2a;
      background: #f8fafc;
      outline: none;
      transition: all 0.2s;
    }
    .form-input:focus {
      border-color: var(--accent);
      background: white;
      box-shadow: 0 0 0 3px rgba(0,194,179,0.13);
    }
    .form-input::placeholder { color: #94a3b8; }

    /* Password wrapper */
    .pw-wrap { position: relative; }
    .pw-wrap .form-input { padding-right: 42px; }
    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: #94a3b8;
      line-height: 1;
      padding: 0;
    }
    .pw-toggle:hover { color: var(--accent); }

    /* ===== SUBMIT BTN ===== */
    .submit-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.22s;
      box-shadow: 0 4px 16px rgba(15,45,82,0.28);
      margin-top: 0.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(15,45,82,0.38);
    }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ===== DIVIDER ===== */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      color: #94a3b8;
      font-size: 0.78rem;
      margin: 1.1rem 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    /* ===== GOOGLE BTN ===== */
    .google-btn {
      width: 100%;
      padding: 11px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: var(--font);
      color: #0d1b2a;
      cursor: pointer;
      transition: all 0.2s;
    }
    .google-btn:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    /* ===== LINKS ===== */
    .bottom-link {
      text-align: center;
      font-size: 0.83rem;
      color: #64748b;
      margin-top: 1rem;
    }
    .bottom-link a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }
    .bottom-link a:hover { text-decoration: underline; }

    /* ===== LOADING OVERLAY ===== */
    .loading-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.82);
      border-radius: 24px;
      align-items: center;
      justify-content: center;
      z-index: 10;
      flex-direction: column;
      gap: 1rem;
    }
    .loading-overlay.show { display: flex; }
    .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.88rem; color: #64748b; font-weight: 500; }

    /* ===== SUCCESS SCREEN ===== */
    .success-screen {
      display: none;
      text-align: center;
      padding: 2.5rem 1.5rem;
    }
    .success-screen.show { display: block; }
    .success-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      animation: bounce 0.5s ease;
    }
    @keyframes bounce {
      0%  { transform: scale(0.5); }
      70% { transform: scale(1.15); }
      100%{ transform: scale(1); }
    }
    .success-title { font-family: var(--display); font-size: 1.3rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem; }
    .success-sub { font-size: 0.88rem; color: #64748b; }

    /* ===== FORGOT LINK ===== */
    .forgot-link {
      text-align: right;
      margin-top: -0.4rem;
      margin-bottom: 1rem;
    }
    .forgot-link a { font-size: 0.8rem; color: var(--accent); cursor: pointer; font-weight: 600; }
    .forgot-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card" style="position:relative;">

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Please wait...</div>
  </div>

  <!-- Success screen -->
  <div class="success-screen" id="successScreen">
    <div class="success-icon">🎉</div>
    <div class="success-title">Welcome to Campus Connect!</div>
    <div class="success-sub">Redirecting to home page...</div>
  </div>

  <!-- Header -->
  <div class="card-header">
    <div class="logo">CC</div>
    <div class="card-title">Campus Connect</div>
    <div class="card-sub">Your college's trusted marketplace</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tabLogin" onclick="switchTab('login')">🔑 Sign In</button>
    <button class="tab"        id="tabSignup" onclick="switchTab('signup')">✨ Sign Up</button>
  </div>

  <!-- Card Body -->
  <div class="card-body">

    <!-- Error box -->
    <div class="error-box" id="errorBox">
      <span>⚠️</span>
      <span id="errorMsg">Something went wrong.</span>
    </div>

    <!-- Domain note -->
    <div class="domain-note">
      🎓 Sirf <strong id="domainDisplay">@college.edu</strong> email allowed hai
    </div>

    <!-- Google Button -->
    <button class="google-btn" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google se Continue karo
    </button>

    <div class="divider">ya</div>

    <!-- ===== LOGIN FORM ===== -->
    <div class="form-section active" id="loginForm">

      <div class="form-group">
        <label class="form-label">College Email</label>
        <input type="email" id="loginEmail" class="form-input"
               placeholder="yourname@college.edu"
               onkeydown="if(event.key==='Enter') loginSubmit()" />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pw-wrap">
          <input type="password" id="loginPw" class="form-input"
                 placeholder="Apna password daalo"
                 onkeydown="if(event.key==='Enter') loginSubmit()" />
          <button class="pw-toggle" onclick="togglePw('loginPw', this)">👁️</button>
        </div>
      </div>

      <div class="forgot-link">
        <a onclick="forgotPw()">Password bhool gaye?</a>
      </div>

      <button class="submit-btn" id="loginBtn" onclick="loginSubmit()">
        Sign In →
      </button>

      <div class="bottom-link">
        Account nahi hai?
        <a onclick="switchTab('signup')">Sign Up karo</a>
      </div>
    </div>

    <!-- ===== SIGNUP FORM ===== -->
    <div class="form-section" id="signupForm">

      <div class="form-group">
        <label class="form-label">Pura Naam *</label>
        <input type="text" id="signupName" class="form-input" placeholder="Apna pura naam" />
      </div>

      <div class="form-group">
        <label class="form-label">College Email *</label>
        <input type="email" id="signupEmail" class="form-input" placeholder="yourname@college.edu" />
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.8rem;">
        <div class="form-group">
          <label class="form-label">Department *</label>
          <select id="signupDept" class="form-input" style="cursor:pointer;">
            <option value="">Select...</option>
            <option>Computer Science</option>
            <option>Electronics & ECE</option>
            <option>Mechanical Engg</option>
            <option>Civil Engg</option>
            <option>Information Tech</option>
            <option>Physics</option>
            <option>Chemistry</option>
            <option>Mathematics</option>
            <option>MBA / Management</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Year *</label>
          <select id="signupYear" class="form-input" style="cursor:pointer;">
            <option value="">Select...</option>
            <option>1st Year</option>
            <option>2nd Year</option>
            <option>3rd Year</option>
            <option>4th Year</option>
            <option>PG / Research</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password * (min 6 characters)</label>
        <div class="pw-wrap">
          <input type="password" id="signupPw" class="form-input"
                 placeholder="Strong password banao" />
          <button class="pw-toggle" onclick="togglePw('signupPw', this)">👁️</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password Confirm karo *</label>
        <div class="pw-wrap">
          <input type="password" id="signupPw2" class="form-input"
                 placeholder="Password dobara daalo"
                 onkeydown="if(event.key==='Enter') signupSubmit()" />
          <button class="pw-toggle" onclick="togglePw('signupPw2', this)">👁️</button>
        </div>
      </div>

      <button class="submit-btn" id="signupBtn" onclick="signupSubmit()"
              style="background: linear-gradient(135deg,#00c2b3,#00a99c); box-shadow: 0 4px 16px rgba(0,194,179,.3);">
        Account Banao ✨
      </button>

      <div class="bottom-link">
        Pehle se account hai?
        <a onclick="switchTab('login')">Sign In karo</a>
      </div>
    </div>

  </div><!-- end card-body -->
</div><!-- end card -->


<!-- ============================================================
     FIREBASE  —  aapka config already filled hai
     ============================================================ -->
<script type="module">
  import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getAuth,
    onAuthStateChanged,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    signInWithPopup,
    GoogleAuthProvider,
    sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import {
    getFirestore,
    doc, setDoc, getDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  /* ✅ AAPKA FIREBASE CONFIG */
  const firebaseConfig = {
    apiKey:            "AIzaSyAhNyL4SuiSmbUsHY22aQI7G5Q8qzx_sIE",
    authDomain:        "campus-connect-f69e7.firebaseapp.com",
    projectId:         "campus-connect-f69e7",
    storageBucket:     "campus-connect-f69e7.firebasestorage.app",
    messagingSenderId: "97294577183",
    appId:             "1:97294577183:web:8c3677eabe72d081402f2a",
    measurementId:     "G-JDVWZC3LF3"
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const db       = getFirestore(app);
  const provider = new GoogleAuthProvider();

  /* ⚠️ APNA COLLEGE EMAIL DOMAIN YAHAN BADLO */
  const DOMAIN = "@college.edu";
  document.getElementById('domainDisplay').textContent = DOMAIN;

  /* ---- Agar already logged in hai toh seedha home pe bhejo ---- */
  onAuthStateChanged(auth, user => {
    if (user) {
      showSuccess();
      setTimeout(() => location.href = 'index.html', 1500);
    }
  });

  /* ======= HELPERS ======= */

  function showLoader(text = 'Please wait...') {
    document.getElementById('loadingText').textContent = text;
    document.getElementById('loadingOverlay').classList.add('show');
  }
  function hideLoader() {
    document.getElementById('loadingOverlay').classList.remove('show');
  }
  function showSuccess() {
    document.getElementById('successScreen').classList.add('show');
    document.querySelector('.card-header').style.display = 'none';
    document.querySelector('.tabs').style.display = 'none';
    document.querySelector('.card-body').style.display = 'none';
  }
  function showError(msg) {
    const box = document.getElementById('errorBox');
    document.getElementById('errorMsg').textContent = msg;
    box.classList.add('show');
    setTimeout(() => box.classList.remove('show'), 5000);
  }
  function checkDomain(email) {
    return email.trim().toLowerCase().endsWith(DOMAIN);
  }
  function friendlyError(code) {
    const map = {
      'auth/user-not-found':      'Yeh email registered nahi hai. Pehle Sign Up karo.',
      'auth/wrong-password':      'Password galat hai. Dobara try karo.',
      'auth/invalid-email':       'Email address sahi format mein nahi hai.',
      'auth/email-already-in-use':'Yeh email pehle se registered hai. Sign In karo.',
      'auth/weak-password':       'Password kam se kam 6 characters ka hona chahiye.',
      'auth/too-many-requests':   'Bahut zyada attempts. Thodi der baad try karo.',
      'auth/popup-closed-by-user':'Google login cancel ho gaya. Dobara try karo.',
      'auth/network-request-failed': 'Internet connection check karo.',
    };
    return map[code] || 'Kuch gadbad ho gayi. Dobara try karo.';
  }

  /* Firestore mein user save karo */
  async function saveUser(user, extra = {}) {
    const ref  = doc(db, 'users', user.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, {
        uid:        user.uid,
        name:       extra.name || user.displayName || 'Student',
        email:      user.email,
        department: extra.dept  || '',
        year:       extra.year  || '',
        photoURL:   user.photoURL || '',
        likedItems: [],
        joinedAt:   serverTimestamp()
      });
    }
  }

  /* ======= LOGIN ======= */
  window.loginSubmit = async function() {
    const email = document.getElementById('loginEmail').value.trim();
    const pw    = document.getElementById('loginPw').value;

    if (!email || !pw)              return showError('Email aur password dono bharo.');
    if (!checkDomain(email))        return showError(`Sirf ${DOMAIN} email allowed hai.`);

    showLoader('Logging in...');
    try {
      await signInWithEmailAndPassword(auth, email, pw);
      showSuccess();
      setTimeout(() => location.href = 'index.html', 1500);
    } catch(e) {
      hideLoader();
      showError(friendlyError(e.code));
    }
  };

  /* ======= SIGNUP ======= */
  window.signupSubmit = async function() {
    const name  = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const dept  = document.getElementById('signupDept').value;
    const year  = document.getElementById('signupYear').value;
    const pw    = document.getElementById('signupPw').value;
    const pw2   = document.getElementById('signupPw2').value;

    if (!name || !email || !dept || !year || !pw || !pw2)
      return showError('Saare fields bharna zaroori hai.');
    if (!checkDomain(email))
      return showError(`Sirf ${DOMAIN} email allowed hai.`);
    if (pw.length < 6)
      return showError('Password kam se kam 6 characters ka hona chahiye.');
    if (pw !== pw2)
      return showError('Dono passwords match nahi kar rahe.');

    showLoader('Account ban raha hai...');
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pw);
      await saveUser(cred.user, { name, dept, year });
      showSuccess();
      setTimeout(() => location.href = 'index.html', 1500);
    } catch(e) {
      hideLoader();
      showError(friendlyError(e.code));
    }
  };

  /* ======= GOOGLE LOGIN ======= */
  window.googleLogin = async function() {
    showLoader('Google se login ho raha hai...');
    try {
      const result = await signInWithPopup(auth, provider);
      const user   = result.user;

      if (!checkDomain(user.email)) {
        await auth.signOut();
        hideLoader();
        return showError(`Sirf ${DOMAIN} email allowed hai. Apna college Google account use karo.`);
      }

      await saveUser(user);
      showSuccess();
      setTimeout(() => location.href = 'index.html', 1500);
    } catch(e) {
      hideLoader();
      showError(friendlyError(e.code));
    }
  };

  /* ======= FORGOT PASSWORD ======= */
  window.forgotPw = async function() {
    const email = document.getElementById('loginEmail').value.trim();
    if (!email)           return showError('Pehle apna email daalo, phir click karo.');
    if (!checkDomain(email)) return showError(`Sirf ${DOMAIN} email allowed hai.`);

    showLoader('Reset email bheja ja raha hai...');
    try {
      await sendPasswordResetEmail(auth, email);
      hideLoader();
      alert('✅ Password reset ka email bhej diya! Apna inbox check karo.');
    } catch(e) {
      hideLoader();
      showError(friendlyError(e.code));
    }
  };
</script>

<!-- UI scripts (no Firebase) -->
<script>
  /* Tab switch */
  function switchTab(tab) {
    document.getElementById('loginForm').classList.toggle('active',  tab === 'login');
    document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
    document.getElementById('tabLogin').classList.toggle('active',   tab === 'login');
    document.getElementById('tabSignup').classList.toggle('active',  tab === 'signup');
    document.getElementById('errorBox').classList.remove('show');
  }

  /* Show / hide password */
  function togglePw(inputId, btn) {
    const inp = document.getElementById(inputId);
    if (inp.type === 'password') {
      inp.type = 'text';
      btn.textContent = '🙈';
    } else {
      inp.type = 'password';
      btn.textContent = '👁️';
    }
  }
</script>
